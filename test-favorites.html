<!DOCTYPE html>
<html>
<head>
    <title>收藏夹功能测试</title>
</head>
<body>
    <h1>收藏夹功能测试</h1>
    <p>访问 <a href="http://localhost:3333" target="_blank">http://localhost:3333</a> 测试以下功能：</p>
    <ol>
        <li>左侧面板应该有 4 个标签页：📷 图片、📋 模板、⭐ 收藏、⚙️ 设置</li>
        <li>点击"⭐ 收藏"标签，应该看到 2 个示例收藏（首次使用）</li>
        <li>在代码编辑器中输入 Mermaid 代码</li>
        <li>点击"⭐ 收藏"按钮，输入名称保存</li>
        <li>在收藏夹标签页中应该能看到新添加的收藏</li>
        <li>点击"▶️ 加载"按钮，代码应该加载到编辑器</li>
        <li>点击"✏️"按钮可以重命名</li>
        <li>点击"🗑️"按钮可以删除</li>
        <li>刷新页面，收藏应该仍然存在（localStorage 持久化）</li>
    </ol>
</body>
</html>
